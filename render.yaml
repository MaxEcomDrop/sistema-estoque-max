services:
  - type: web
    name: sistema-estoque-max
    runtime: node
    plan: standard
    startCommand: node index.js
    buildCommand: npm install
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
    autoDeploy: true
    healthCheckPath: /health
    disk:
      name: estoque_storage
      mountPath: /data
      sizeGB: 1
