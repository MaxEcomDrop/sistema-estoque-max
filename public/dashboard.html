<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel — Estoque Max</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --sidebar-w: 220px;
      --sidebar-bg: #0f172a;
      --bg: #f8fafc;
      --surface: #ffffff;
      --border: #e2e8f0;
      --border-light: #f1f5f9;
      --accent: #4f46e5;
      --accent-hover: #4338ca;
      --text: #0f172a;
      --muted: #64748b;
      --faint: #94a3b8;
      --success: #16a34a;
      --danger: #dc2626;
      --warning: #d97706;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
    }

    /* ═══════════════════════════════════════ SIDEBAR */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--sidebar-bg);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      position: fixed;
      top: 0; left: 0; bottom: 0;
    }

    .sidebar-header {
      padding: 20px 20px 16px;
      border-bottom: 1px solid rgba(255,255,255,.06);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-mark {
      width: 32px; height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }

    .brand-name {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      letter-spacing: -0.2px;
    }

    .sidebar-nav {
      flex: 1;
      padding: 12px 10px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .nav-section {
      font-size: 10px;
      font-weight: 600;
      color: #334155;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      padding: 12px 10px 6px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 10px;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 500;
      color: #94a3b8;
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
      text-decoration: none;
      user-select: none;
    }

    .nav-item:hover { background: rgba(255,255,255,.06); color: #e2e8f0; }
    .nav-item.active { background: rgba(79,70,229,.25); color: #c7d2fe; }
    .nav-item.active svg { color: #818cf8; }

    .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }

    .sidebar-footer {
      padding: 14px 10px;
      border-top: 1px solid rgba(255,255,255,.06);
    }

    .btn-logout {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 9px 10px;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 500;
      color: #64748b;
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.12s, color 0.12s;
    }
    .btn-logout:hover { background: rgba(255,255,255,.05); color: #94a3b8; }
    .btn-logout svg { width: 16px; height: 16px; }

    /* ═══════════════════════════════════════ MAIN */
    .main {
      margin-left: var(--sidebar-w);
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── Top bar ── */
    .topbar {
      height: 56px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .topbar-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .btn-sync {
      display: flex;
      align-items: center;
      gap: 7px;
      height: 34px;
      padding: 0 14px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-sync:hover { background: var(--accent-hover); }
    .btn-sync:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-sync svg { width: 14px; height: 14px; }

    .sync-spinning { animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Content area ── */
    .content {
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* ── KPI Cards ── */
    .kpi-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .kpi-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 22px;
    }

    .kpi-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .kpi-label svg { width: 13px; height: 13px; }

    .kpi-value {
      font-size: 32px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -1px;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .kpi-sub {
      font-size: 12px;
      color: var(--faint);
      margin-top: 6px;
    }

    /* ── Table card ── */
    .table-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .table-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border-light);
      gap: 12px;
    }

    .toolbar-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .table-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }

    .badge-count {
      background: #f1f5f9;
      color: var(--muted);
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
    }

    .search-wrap {
      position: relative;
    }

    .search-wrap svg {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 14px; height: 14px;
      color: var(--faint);
      pointer-events: none;
    }

    .search-input {
      height: 34px;
      padding: 0 12px 0 32px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      font-size: 13px;
      font-family: inherit;
      color: var(--text);
      outline: none;
      width: 220px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79,70,229,.08);
      background: #fff;
    }

    .search-input::placeholder { color: var(--faint); }

    /* ── Table ── */
    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      padding: 10px 20px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--muted);
      background: #fafbfc;
      border-bottom: 1px solid var(--border-light);
      white-space: nowrap;
    }

    thead th.right { text-align: right; }

    tbody tr {
      border-bottom: 1px solid var(--border-light);
      transition: background 0.1s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #f8fafc; }

    tbody td {
      padding: 14px 20px;
      font-size: 13px;
      color: var(--text);
      vertical-align: middle;
    }

    tbody td.right { text-align: right; }

    .sku-badge {
      font-family: 'SFMono-Regular', Consolas, monospace;
      font-size: 11px;
      background: #f1f5f9;
      color: #475569;
      padding: 3px 8px;
      border-radius: 5px;
      letter-spacing: 0.3px;
    }

    .product-name {
      font-weight: 500;
      color: var(--text);
      max-width: 280px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .price-cell, .stock-cell {
      font-variant-numeric: tabular-nums;
      font-weight: 500;
    }

    .editable-val {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: background 0.12s;
    }

    .editable-val:hover {
      background: var(--border-light);
    }

    .editable-val:hover .edit-icon { opacity: 1; }

    .edit-icon {
      opacity: 0;
      transition: opacity 0.12s;
      color: var(--faint);
    }

    .edit-icon svg { width: 12px; height: 12px; }

    .inline-input {
      height: 32px;
      padding: 0 10px;
      border: 1.5px solid var(--accent);
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
      font-variant-numeric: tabular-nums;
      color: var(--text);
      outline: none;
      width: 100px;
      box-shadow: 0 0 0 3px rgba(79,70,229,.1);
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 20px;
      white-space: nowrap;
    }

    .status-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-ativo { background: #f0fdf4; color: #15803d; }
    .status-ativo .status-dot { background: #16a34a; }

    .status-baixo { background: #fffbeb; color: #b45309; }
    .status-baixo .status-dot { background: #d97706; }

    .status-esgotado { background: #fff1f2; color: #be123c; }
    .status-esgotado .status-dot { background: #e11d48; }

    /* ── States ── */
    .state-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 64px 24px;
      text-align: center;
      gap: 12px;
    }

    .state-icon {
      width: 48px; height: 48px;
      background: var(--bg);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 4px;
    }

    .state-icon svg { width: 22px; height: 22px; color: var(--faint); }

    .state-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }

    .state-desc {
      font-size: 13px;
      color: var(--muted);
      max-width: 300px;
    }

    .state-btn {
      margin-top: 8px;
      height: 36px;
      padding: 0 18px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
    }
    .state-btn:hover { background: var(--accent-hover); }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #1e293b;
      color: #fff;
      padding: 12px 18px;
      border-radius: 9px;
      font-size: 13px;
      font-weight: 500;
      box-shadow: 0 8px 24px rgba(0,0,0,.18);
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      z-index: 9999;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.error { background: #7f1d1d; }

    /* ── Loading row ── */
    .skeleton-row td {
      padding: 14px 20px;
    }

    .skeleton {
      background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 5px;
      height: 14px;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    @media (max-width: 900px) {
      .sidebar { display: none; }
      .main { margin-left: 0; }
      .kpi-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- ═══════════════════ SIDEBAR ═══════════════════ -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="brand">
        <div class="brand-mark">EM</div>
        <span class="brand-name">Estoque Max</span>
      </div>
    </div>

    <nav class="sidebar-nav">
      <span class="nav-section">Menu</span>

      <a class="nav-item active" href="/dashboard.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="3" width="7" height="9" rx="1"/><rect x="13" y="3" width="9" height="5" rx="1"/><rect x="13" y="12" width="9" height="9" rx="1"/><rect x="2" y="16" width="7" height="5" rx="1"/>
        </svg>
        Painel
      </a>

      <a class="nav-item" href="/dashboard.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
        </svg>
        Produtos
      </a>

      <a class="nav-item" href="/">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.84"/>
        </svg>
        Reconectar Bling
      </a>
    </nav>

    <div class="sidebar-footer">
      <button class="btn-logout" onclick="logout()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Sair
      </button>
    </div>
  </aside>

  <!-- ═══════════════════ MAIN ═══════════════════ -->
  <div class="main">

    <!-- Top bar -->
    <header class="topbar">
      <span class="topbar-title">Produtos</span>
      <div class="topbar-actions">
        <button class="btn-sync" id="syncBtn" onclick="sync()">
          <svg id="syncIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.84"/>
          </svg>
          Sincronizar
        </button>
      </div>
    </header>

    <!-- Content -->
    <div class="content">

      <!-- KPI Row -->
      <div class="kpi-row">
        <div class="kpi-card">
          <div class="kpi-label">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-4 0v2"/></svg>
            Total de Produtos
          </div>
          <div class="kpi-value" id="kpiTotal">—</div>
          <div class="kpi-sub" id="kpiTotalSub">Carregando…</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            Em Estoque
          </div>
          <div class="kpi-value" id="kpiInStock">—</div>
          <div class="kpi-sub" id="kpiInStockSub">com quantidade &gt; 0</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            Sem Estoque
          </div>
          <div class="kpi-value" id="kpiOut">—</div>
          <div class="kpi-sub" id="kpiOutSub">precisam de reposição</div>
        </div>
      </div>

      <!-- Table Card -->
      <div class="table-card">
        <div class="table-toolbar">
          <div class="toolbar-left">
            <span class="table-title">Lista de Produtos</span>
            <span class="badge-count" id="countBadge">—</span>
          </div>
          <div class="search-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input class="search-input" type="search" id="searchInput" placeholder="Buscar por nome ou SKU…" oninput="filterTable(this.value)">
          </div>
        </div>

        <table>
          <thead>
            <tr>
              <th style="width:110px">SKU</th>
              <th>Produto</th>
              <th class="right" style="width:130px">Preço</th>
              <th class="right" style="width:120px">Estoque</th>
              <th style="width:110px">Status</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <!-- Skeleton -->
            <tr class="skeleton-row"><td><div class="skeleton" style="width:70px"></div></td><td><div class="skeleton" style="width:180px"></div></td><td><div class="skeleton" style="width:60px;margin-left:auto"></div></td><td><div class="skeleton" style="width:50px;margin-left:auto"></div></td><td><div class="skeleton" style="width:60px"></div></td></tr>
            <tr class="skeleton-row"><td><div class="skeleton" style="width:80px"></div></td><td><div class="skeleton" style="width:240px"></div></td><td><div class="skeleton" style="width:60px;margin-left:auto"></div></td><td><div class="skeleton" style="width:50px;margin-left:auto"></div></td><td><div class="skeleton" style="width:70px"></div></td></tr>
            <tr class="skeleton-row"><td><div class="skeleton" style="width:65px"></div></td><td><div class="skeleton" style="width:200px"></div></td><td><div class="skeleton" style="width:60px;margin-left:auto"></div></td><td><div class="skeleton" style="width:50px;margin-left:auto"></div></td><td><div class="skeleton" style="width:60px"></div></td></tr>
          </tbody>
        </table>
      </div>

    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    let allProducts = [];

    // ── Utils ──────────────────────────────────────────────────

    function fmt(n) {
      return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(n);
    }

    function toast(msg, type = 'ok') {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.className = 'toast show' + (type === 'error' ? ' error' : '');
      clearTimeout(el._t);
      el._t = setTimeout(() => { el.classList.remove('show'); }, 3000);
    }

    function statusBadge(stock) {
      if (stock === 0)  return `<span class="status-badge status-esgotado"><span class="status-dot"></span>Esgotado</span>`;
      if (stock <= 3)   return `<span class="status-badge status-baixo"><span class="status-dot"></span>Estoque baixo</span>`;
      return `<span class="status-badge status-ativo"><span class="status-dot"></span>Em estoque</span>`;
    }

    const editSvg = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`;

    // ── Render ─────────────────────────────────────────────────

    function renderTable(products) {
      const tbody = document.getElementById('tableBody');

      if (!products.length) {
        tbody.innerHTML = `
          <tr><td colspan="5">
            <div class="state-wrap">
              <div class="state-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-4 0v2"/>
                </svg>
              </div>
              <p class="state-title">Nenhum produto encontrado</p>
              <p class="state-desc">Ajuste o filtro de busca ou clique em Sincronizar para atualizar os dados.</p>
            </div>
          </td></tr>`;
        return;
      }

      tbody.innerHTML = products.map(p => `
        <tr data-id="${p.id}">
          <td><span class="sku-badge">${escHtml(p.codigo)}</span></td>
          <td><span class="product-name" title="${escHtml(p.nome)}">${escHtml(p.nome)}</span></td>
          <td class="right">
            <span class="price-cell editable-val" onclick="editCell(this,'preco',${p.id},${p.preco})">
              ${fmt(p.preco)}
              <span class="edit-icon">${editSvg}</span>
            </span>
          </td>
          <td class="right">
            <span class="stock-cell editable-val" onclick="editCell(this,'estoque',${p.id},${p.estoque})">
              ${p.estoque} un.
              <span class="edit-icon">${editSvg}</span>
            </span>
          </td>
          <td>${statusBadge(p.estoque)}</td>
        </tr>
      `).join('');
    }

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function updateKpis(products) {
      const total   = products.length;
      const inStock = products.filter(p => p.estoque > 0).length;
      const out     = total - inStock;

      document.getElementById('kpiTotal').textContent    = total;
      document.getElementById('kpiInStock').textContent  = inStock;
      document.getElementById('kpiOut').textContent      = out;
      document.getElementById('kpiTotalSub').textContent = `${total} produto${total !== 1 ? 's' : ''} no Bling`;
      document.getElementById('countBadge').textContent  = `${total} produto${total !== 1 ? 's' : ''}`;
    }

    function filterTable(q) {
      const filtered = q.trim()
        ? allProducts.filter(p =>
            p.nome.toLowerCase().includes(q.toLowerCase()) ||
            p.codigo.toLowerCase().includes(q.toLowerCase())
          )
        : allProducts;

      renderTable(filtered);
      document.getElementById('countBadge').textContent = `${filtered.length} produto${filtered.length !== 1 ? 's' : ''}`;
    }

    // ── Load products ──────────────────────────────────────────

    async function load(showSkeleton = false) {
      try {
        const res  = await fetch('/api/produtos');
        const data = await res.json();

        if (res.status === 401 && data.code === 'BLING_NOT_CONNECTED') {
          document.getElementById('tableBody').innerHTML = `
            <tr><td colspan="5">
              <div class="state-wrap">
                <div class="state-icon">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
                  </svg>
                </div>
                <p class="state-title">Bling não conectado</p>
                <p class="state-desc">Conecte sua conta Bling para carregar os produtos.</p>
                <button class="state-btn" onclick="window.location.href='/'">Conectar Bling</button>
              </div>
            </td></tr>`;
          return;
        }

        if (!res.ok) throw new Error(data.error || 'Erro ao carregar');

        allProducts = data.products || [];
        const q = document.getElementById('searchInput').value;
        filterTable(q);
        updateKpis(allProducts);
      } catch (err) {
        toast('Erro ao carregar produtos: ' + err.message, 'error');
      }
    }

    // ── Sync ───────────────────────────────────────────────────

    async function sync() {
      const btn  = document.getElementById('syncBtn');
      const icon = document.getElementById('syncIcon');
      btn.disabled = true;
      icon.classList.add('sync-spinning');
      await load();
      icon.classList.remove('sync-spinning');
      btn.disabled = false;
      toast('Produtos atualizados com sucesso');
    }

    // ── Inline edit ────────────────────────────────────────────

    function editCell(cell, field, id, current) {
      const input = document.createElement('input');
      input.className = 'inline-input';
      input.type  = 'number';
      input.value = current;
      input.step  = field === 'preco' ? '0.01' : '1';
      input.min   = '0';

      cell.replaceWith(input);
      input.focus();
      input.select();

      const restore = () => {
        const p = allProducts.find(x => x.id === id);
        if (!p) return;
        const span = document.createElement('span');
        const cls  = field === 'preco' ? 'price-cell editable-val' : 'stock-cell editable-val';
        span.className = cls;
        span.innerHTML = (field === 'preco' ? fmt(p.preco) : `${p.estoque} un.`) + `<span class="edit-icon">${editSvg}</span>`;
        span.onclick = () => editCell(span, field, id, field === 'preco' ? p.preco : p.estoque);
        input.replaceWith(span);
      };

      const save = async () => {
        const val = parseFloat(input.value);
        if (isNaN(val) || val < 0) { restore(); return; }

        const payload = {};
        payload[field] = val;

        try {
          const res = await fetch(`/api/produtos/${id}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          });

          if (res.ok) {
            const p = allProducts.find(x => x.id === id);
            if (p) p[field] = val;
            toast(`${field === 'preco' ? 'Preço' : 'Estoque'} atualizado`);
            restore();
            // Update status badge
            const row = document.querySelector(`tr[data-id="${id}"]`);
            if (row && field === 'estoque') {
              row.querySelector('td:last-child').innerHTML = statusBadge(val);
            }
          } else {
            const err = await res.json();
            toast(err.error || 'Erro ao salvar', 'error');
            restore();
          }
        } catch {
          toast('Erro de conexão', 'error');
          restore();
        }
      };

      input.addEventListener('blur', save);
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') { input.blur(); }
        if (e.key === 'Escape') { restore(); }
      });
    }

    // ── Auth ───────────────────────────────────────────────────

    async function logout() {
      await fetch('/api/auth/logout', { method: 'POST' });
      window.location.href = '/login';
    }

    // ── Init ───────────────────────────────────────────────────

    load(true);
    setInterval(load, 60000);
  </script>
</body>
</html>
