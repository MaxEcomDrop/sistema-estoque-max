<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Estoque Max</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .header {
      background: white;
      padding: 30px;
      border-radius: 12px;
      margin-bottom: 30px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 {
      font-size: 28px;
      color: #667eea;
      font-weight: 700;
    }

    .header-right {
      display: flex;
      gap: 15px;
      align-items: center;
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
      font-size: 14px;
    }

    .btn-primary {
      background: #667eea;
      color: white;
    }

    .btn-primary:hover {
      background: #5568d3;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    .btn-logout {
      background: #ff6b6b;
      color: white;
    }

    .btn-logout:hover {
      background: #ff5252;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      text-align: center;
    }

    .stat-card h3 {
      color: #999;
      font-size: 12px;
      text-transform: uppercase;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    .stat-card .number {
      font-size: 36px;
      color: #667eea;
      font-weight: 700;
    }

    .table-container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      overflow: hidden;
    }

    .table-header {
      padding: 20px;
      background: #f8f9fa;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .table-header h2 {
      font-size: 18px;
      color: #333;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      background: #f8f9fa;
      padding: 15px;
      text-align: left;
      font-weight: 600;
      color: #666;
      border-bottom: 2px solid #e0e0e0;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    tbody td {
      padding: 15px;
      border-bottom: 1px solid #f0f0f0;
      color: #333;
    }

    tbody tr:hover {
      background: #f9f9f9;
    }

    .sku {
      font-family: monospace;
      background: #f0f0f0;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
    }

    .price {
      color: #2e7d32;
      font-weight: 600;
    }

    .stock {
      font-weight: 600;
      color: #667eea;
    }

    .editable {
      cursor: pointer;
      position: relative;
      padding: 8px;
      border-radius: 4px;
      transition: all 0.2s;
    }

    .editable:hover {
      background: #f0f0f0;
    }

    .editable::after {
      content: '✏️';
      margin-left: 8px;
      opacity: 0.5;
      font-size: 12px;
    }

    .editable:hover::after {
      opacity: 1;
    }

    .empty {
      text-align: center;
      padding: 60px 20px;
      color: #999;
    }

    .empty-icon {
      font-size: 48px;
      margin-bottom: 20px;
    }

    .message {
      padding: 15px 20px;
      border-radius: 6px;
      margin-bottom: 20px;
      display: none;
    }

    .message.success {
      background: #c3e9cb;
      color: #2e7d32;
      display: block;
    }

    .message.error {
      background: #ffcdd2;
      color: #c62828;
      display: block;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #667eea;
    }

    .spinner {
      border: 3px solid #f0f0f0;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @media (max-width: 768px) {
      .header {
        flex-direction: column;
        gap: 20px;
      }

      table {
        font-size: 12px;
      }

      thead th, tbody td {
        padding: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <h1>📦 Sistema de Estoque Max</h1>
      <div class="header-right">
        <button class="btn btn-primary" onclick="syncProdutos()">🔄 Sincronizar</button>
        <button class="btn btn-logout" onclick="logout()">Sair</button>
      </div>
    </div>

    <!-- Message -->
    <div id="message" class="message"></div>

    <!-- Stats -->
    <div class="stats">
      <div class="stat-card">
        <h3>Total de Produtos</h3>
        <div class="number" id="total">0</div>
      </div>
      <div class="stat-card">
        <h3>Em Estoque</h3>
        <div class="number" id="inStock">0</div>
      </div>
      <div class="stat-card">
        <h3>Fora de Estoque</h3>
        <div class="number" id="outOfStock">0</div>
      </div>
    </div>

    <!-- Table -->
    <div class="table-container">
      <div class="table-header">
        <h2>Produtos</h2>
      </div>
      <div id="products"></div>
    </div>
  </div>

  <script>
    async function loadProdutos() {
      try {
        const response = await fetch('/api/produtos');
        const data = await response.json();

        const html = `
          <table>
            <thead>
              <tr>
                <th>SKU</th>
                <th>Nome</th>
                <th>Preço</th>
                <th>Estoque</th>
              </tr>
            </thead>
            <tbody>
              ${data.products.map(p => `
                <tr>
                  <td><span class="sku">${p.codigo}</span></td>
                  <td>${p.nome}</td>
                  <td class="price editable" onclick="editField(this, 'preco', ${p.id})">
                    R$ ${p.preco.toFixed(2)}
                  </td>
                  <td class="stock editable" onclick="editField(this, 'estoque', ${p.id})">
                    ${p.estoque} un.
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        `;

        document.getElementById('products').innerHTML = html;
        updateStats(data.products);
      } catch (error) {
        showMessage(`Erro: ${error.message}`, 'error');
      }
    }

    function updateStats(products) {
      const total = products.length;
      const inStock = products.filter(p => p.estoque > 0).length;
      const outOfStock = total - inStock;

      document.getElementById('total').textContent = total;
      document.getElementById('inStock').textContent = inStock;
      document.getElementById('outOfStock').textContent = outOfStock;
    }

    async function syncProdutos() {
      showMessage('⏳ Sincronizando...', 'success');
      await new Promise(r => setTimeout(r, 1000));
      loadProdutos();
      showMessage('✅ Produtos sincronizados!', 'success');
    }

    function editField(cell, field, id) {
      const value = cell.textContent.replace(/[R$\s\un.]/g, '').trim();
      const input = document.createElement('input');
      input.type = 'number';
      input.value = value;
      input.step = field === 'preco' ? '0.01' : '1';

      const save = async () => {
        const payload = {};
        payload[field] = parseFloat(input.value);

        try {
          const res = await fetch(`/api/produtos/${id}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          });

          if (res.ok) {
            showMessage('✅ Atualizado!', 'success');
            loadProdutos();
          }
        } catch (error) {
          showMessage(`Erro: ${error.message}`, 'error');
          loadProdutos();
        }
      };

      input.onblur = save;
      input.onkeydown = (e) => {
        if (e.key === 'Enter') save();
        if (e.key === 'Escape') loadProdutos();
      };

      cell.innerHTML = '';
      cell.appendChild(input);
      input.focus();
      input.select();
    }

    function showMessage(text, type) {
      const msg = document.getElementById('message');
      msg.textContent = text;
      msg.className = `message ${type}`;
      setTimeout(() => msg.className = 'message', 5000);
    }

    async function logout() {
      await fetch('/api/auth/logout', { method: 'POST' });
      window.location.href = '/';
    }

    loadProdutos();
    setInterval(loadProdutos, 30000);
  </script>
</body>
</html>
