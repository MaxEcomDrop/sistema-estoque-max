<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#4f46e5">
  <title>Entrar — Estoque Max</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="manifest" href="/manifest.json">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',system-ui,sans-serif;min-height:100vh;min-height:100dvh;display:flex;background:#f8fafc;color:#0f172a}
    /* LEFT PANEL */
    .left{flex:0 0 460px;display:flex;flex-direction:column;justify-content:center;padding:48px 56px;background:#fff;position:relative;z-index:1;min-height:100vh;min-height:100dvh}
    .logo{display:flex;align-items:center;gap:10px;margin-bottom:40px}
    .logo-mark{width:38px;height:38px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff;box-shadow:0 4px 14px rgba(99,102,241,.4)}
    .logo-name{font-size:17px;font-weight:700;color:#0f172a;letter-spacing:-.3px}
    h1{font-size:27px;font-weight:800;color:#0f172a;letter-spacing:-.6px;margin-bottom:8px}
    .sub{font-size:14px;color:#64748b;margin-bottom:32px;line-height:1.6}
    .err-box{background:#fef2f2;border:1px solid #fecaca;color:#b91c1c;padding:12px 14px;border-radius:10px;font-size:13px;margin-bottom:18px;display:none;align-items:center;gap:8px;animation:shake .4s}
    @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
    .field{margin-bottom:16px}
    .field label{display:block;font-size:12px;font-weight:600;color:#475569;margin-bottom:7px;letter-spacing:.2px}
    .input-wrap{position:relative}
    .input-wrap svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:17px;height:17px;color:#94a3b8;pointer-events:none}
    .field input{width:100%;height:50px;padding:0 14px 0 42px;background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:12px;font-size:14.5px;font-family:inherit;color:#0f172a;outline:none;transition:border-color .15s,box-shadow .15s,background .15s}
    .field input:focus{border-color:#6366f1;background:#fff;box-shadow:0 0 0 4px rgba(99,102,241,.12)}
    .field input::placeholder{color:#cbd5e1}
    .pw-toggle{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#94a3b8;padding:8px;display:flex;border-radius:8px;transition:color .12s}
    .pw-toggle:hover{color:#475569}
    .pw-toggle svg{position:static;transform:none;width:18px;height:18px}
    .btn-main{width:100%;height:52px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border:none;border-radius:13px;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;transition:opacity .15s,transform .1s,box-shadow .15s;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 4px 16px rgba(99,102,241,.4);margin-top:8px;-webkit-tap-highlight-color:transparent}
    .btn-main:hover{opacity:.94;transform:translateY(-1px);box-shadow:0 6px 22px rgba(99,102,241,.48)}
    .btn-main:active{transform:translateY(0)}
    .btn-main:disabled{opacity:.6;cursor:not-allowed;transform:none;box-shadow:none}
    .spin{width:18px;height:18px;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;display:none}
    @keyframes sp{to{transform:rotate(360deg)}}
    .foot-note{font-size:12.5px;color:#94a3b8;margin-top:24px;text-align:center;line-height:1.6}
    .pwa-bar{margin-top:20px;padding:13px 16px;background:#ede9fe;border-radius:12px;display:none;align-items:center;gap:12px;cursor:pointer;transition:background .15s;border:1px solid #ddd6fe}
    .pwa-bar:hover{background:#ddd6fe}
    .pwa-icon{width:34px;height:34px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .pwa-icon svg{width:16px;height:16px;color:#fff}
    .pwa-text strong{display:block;font-size:13px;font-weight:600;color:#3730a3}
    .pwa-text span{font-size:12px;color:#6d28d9}
    /* RIGHT PANEL */
    .right{flex:1;background:linear-gradient(135deg,#4f46e5 0%,#7c3aed 60%,#6366f1 100%);display:flex;align-items:center;justify-content:center;padding:48px;position:relative;overflow:hidden}
    .right::before{content:'';position:absolute;width:520px;height:520px;background:rgba(255,255,255,.05);border-radius:50%;top:-130px;right:-130px}
    .right::after{content:'';position:absolute;width:360px;height:360px;background:rgba(255,255,255,.04);border-radius:50%;bottom:-90px;left:-70px}
    .right-content{position:relative;z-index:1;text-align:center;max-width:420px}
    .right-content h2{font-size:36px;font-weight:800;color:#fff;letter-spacing:-.8px;margin-bottom:14px;line-height:1.15}
    .right-content h2 em{font-style:normal;color:#c4b5fd}
    .right-content p{font-size:15px;color:rgba(255,255,255,.72);line-height:1.7;margin-bottom:40px}
    .feat-list{display:flex;flex-direction:column;gap:12px;text-align:left}
    .feat{display:flex;align-items:center;gap:14px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:14px;padding:14px 18px;-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);transition:background .15s,transform .15s}
    .feat:hover{background:rgba(255,255,255,.16);transform:translateX(4px)}
    .feat-ico{width:38px;height:38px;background:rgba(255,255,255,.18);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .feat-ico svg{width:19px;height:19px;color:#fff}
    .feat-txt{font-size:14px;color:rgba(255,255,255,.92);font-weight:500;line-height:1.3}
    .feat-sub{font-size:12px;color:rgba(255,255,255,.55);margin-top:2px}
    @media(max-width:860px){
      body{flex-direction:column}
      .left{flex:none;min-height:100vh;min-height:100dvh;padding:max(36px,env(safe-area-inset-top)) 24px 32px;justify-content:center}
      .right{display:none}
    }
  </style>
</head>
<body>

<div class="left">
  <div class="logo">
    <div class="logo-mark">EM</div>
    <span class="logo-name">Estoque Max</span>
  </div>

  <h1>Entrar na sua conta</h1>
  <p class="sub">Acesse o painel de controle do seu estoque, vendas e finanças.</p>

  <div class="err-box" id="errBox">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <span id="errMsg"></span>
  </div>

  <button type="button" class="btn-main" id="googleLoginBtn" style="background:linear-gradient(135deg,#fff 0%,#f8fafc 100%);color:#0f172a;border:1.5px solid #e2e8f0;box-shadow:0 2px 8px rgba(15,23,42,.08);margin-bottom:16px">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
    <span>Entrar com Google</span>
  </button>

  <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;color:#cbd5e1">
    <div style="flex:1;height:1px;background:#e2e8f0"></div>
    <span style="font-size:12px;font-weight:500">OU</span>
    <div style="flex:1;height:1px;background:#e2e8f0"></div>
  </div>

  <form id="loginForm">
    <div class="field">
      <label for="email">E-mail</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        <input type="email" id="email" name="email" placeholder="seu@email.com" autocomplete="username" required>
      </div>
    </div>
    <div class="field">
      <label for="password">Senha</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
        <button type="button" class="pw-toggle" id="pwToggle" onclick="togglePw()" aria-label="Mostrar senha">
          <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>
    <button class="btn-main" id="btnSubmit" type="submit">
      <div class="spin" id="spin"></div>
      <span id="btnTxt">Entrar</span>
    </button>
  </form>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const form = document.getElementById('loginForm');
      const errBox = document.getElementById('errBox');
      const errMsg = document.getElementById('errMsg');
      const btn = document.getElementById('btnSubmit');
      const btnTxt = document.getElementById('btnTxt');
      const spin = document.getElementById('spin');

      function showError(msg) {
        errBox.style.display = 'flex';
        errMsg.textContent = msg;
        // Reinicia animação
        errBox.style.animation = 'none';
        errBox.offsetHeight;
        errBox.style.animation = 'shake 0.4s';
      }

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errBox.style.display = 'none';
        btn.disabled = true;
        btnTxt.style.display = 'none';
        spin.style.display = 'block';

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        try {
          const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
          });
          const data = await res.json();
          if (res.ok && data.success) {
            window.location.href = '/dashboard.html';
          } else {
            showError(data.error || 'Erro ao fazer login.');
            btn.disabled = false;
            btnTxt.style.display = 'block';
            spin.style.display = 'none';
          }
        } catch (error) {
          showError('Falha de conexão. Tente novamente.');
          btn.disabled = false;
          btnTxt.style.display = 'block';
          spin.style.display = 'none';
        }
      });

      const toggle = document.querySelector('.pw-toggle');
      const pwInput = document.getElementById('password');
      if (toggle) {
        toggle.addEventListener('click', () => {
          if (pwInput.type === 'password') {
            pwInput.type = 'text';
            toggle.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" /></svg>';
          } else {
            pwInput.type = 'password';
            toggle.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>';
          }
        });
      }
    });
  </script>
</body>
</html>
